<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Tools Pure JS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="sidebar">
    <h2>⚡ Tools</h2>
    <button onclick="setTool('ip')">IP Lookup</button>
    <button onclick="setTool('base64')">Base64 Encode</button>
    <button onclick="setTool('decode')">Base64 Decode</button>
    <button onclick="setTool('password')">Password</button>
    <button onclick="setTool('sha256')">SHA256</button>
    <button onclick="setTool('length')">Text Length</button>
  </div>

  <div class="main">
    <div class="card">
      <h2 id="toolTitle">Tool</h2>
      <input id="input" placeholder="Enter value">
      <button onclick="runTool()">Run</button>
      <pre id="output"></pre>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
